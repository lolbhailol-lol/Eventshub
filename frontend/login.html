<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventsHub - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="brand">EventsHub</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Signup</a>
        <button id="logoutBtn" type="button" class="logout-btn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="form-page">
    <section class="form-card">
      <h1>Welcome Back</h1>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container footer-content">
      <p>Need support? Contact <a href="mailto:eventhub0120@gmail.com">eventhub0120@gmail.com</a></p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
